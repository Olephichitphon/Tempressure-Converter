<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>แอพแปลงอุณหภูมิ</h1>
    <section class="container">
        <label for="celsius">องศาเซลเซียส</label>
        <input type="number" name="celsius" id="celsius" placeholder="0">

        <label for="fahrenheit">องศาฟาเรนไฮต์</label>
        <input type="number" name="fahrenheit" id="fahrenheit" placeholder="32">

        <label for="kelvin">องศาเคลวิน</label>
        <input type="number" name="kelvin" id="kelvin" placeholder="273.15">
    </section>
    <script src="script.js"></script>
</body>

</html>
